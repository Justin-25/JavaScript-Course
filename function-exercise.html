  <script>

    let cartQuantity = 0;
    const limit = 10;

    function showQTY() {
      console.log(`Cart: ${cartQuantity}`)
    }

    function updateCartQuantity(cart) {
      const qty = cartQuantity + cart; 
      if ( qty > limit) {
        alert(`The cart is Full.`);
        return;
      }
      cartQuantity = qty;
      console.log(`Added: ${cartQuantity}`);
    }

    function removeCartQuantity(minus) {
      const remove = cartQuantity - minus;
      if ( remove < 0 ) {
        alert('Not enough items in the cart.');
        return;
      }
      cartQuantity = remove;
      console.log(`Added: ${cartQuantity}`);
    }

    function resetCartQuantity(reset) {
      const zero = cartQuantity = 0;
      if ( zero < 0 ) {
        alert('Not enough items in the cart.');
        return;
      }
      cartQuantity = zero;
      console.log(`Your Cart has been reset. : ${cartQuantity}`);
    }

    let calculator = JSON.parse(localStorage.getItem('calculator'));

    if (calculator === null) {
      calculator = '';

    function updateCalculation(number) {
      calculator += number;
      console.log(calculator);

      localStorage.setItem('calculator', JSON.stringify(calculator));
    }

    function calculatorPlus(plus) {
      calculator += plus;
      console.log(calculator);

      localStorage.setItem('calculator', JSON.stringify(calculator));
    }

    function resultCalculator(result) {
      calculator = eval(calculator);
      console.log(`Total: ${calculator}`);

      localStorage.setItem('calculator', JSON.stringify(calculator));
