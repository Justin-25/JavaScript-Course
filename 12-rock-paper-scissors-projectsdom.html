<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM rock paper scissor projects</title>
  <link rel="stylesheet" href="style/rock-paper-scissors.css">
</head>
<body>
  <p class="title">Rock. Paper. Scissor</p>
  <button class="circle-button" onclick="playerMove('rock')"><img src="images/rock-emoji.png" alt="Rock"></button>
  <button class="circle-button" onclick="playerMove('paper')"><img src="images/paper-emoji.png" alt="Paper"></button>
  <button class="circle-button" onclick="playerMove('scissors')"><img src="images/scissors-emoji.png" alt="Scissor"></button>
  <p class="js-result"></p>
  <p class="js-pick"></p>
  <p class="js-score"></p>
  <button class="reset" onclick="
      score.wins = 0;
      score.losses = 0;
      score.tie = 0;
      localStorage.removeItem('score');
      updateScore();
  ">Reset Score</button>
  <button class="auto-play"
    onclick="
      autoPLay();
  ">Auto Play</button>
  <script src="scripts/12-rock-paper-scissors.js"></script>
</body>
</html>
