  <title>Object-exercise</title>
</head>
<body>
  <script>
    const product = {
      basketball: 2095,
      delivery_time: '3 days'
    };

    product.basketball = 2595;
    console.log(product);

    product1 = {
      name: 'ball',
      price: 3095
    };

    product2 = {
      name: 'bat',
      price: 2085
    };

    function comparePrice(product1, product2) {
      const cents = 100;

      if (product1.price < product2.price) {
        return product1;
      } else if (product2.price < product1.price) {
        return product2;
      }
    }

    console.log(comparePrice(product1, product2));

    function isSameProduct(product1, product2) {

      if (product1.name === product2.name && product1.price === product2.price) {
        return true;
      } else {
        return false;
      }
    }

    console.log(isSameProduct(product1, product2));

    const string = ' Good Morning';

    console.log(string.toLowerCase().repeat(5));

  </script>
</body>
