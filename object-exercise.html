    let score = JSON.parse(localStorage.getItem('score'));

    }

    function playGame(guess) {
      const random = Math.random();
      let result = random < 0.5 ? 'heads' : 'tails';
      
      if (result === guess) {
        score.wins++;
        console.log(`Your guess: ${guess}, You win. \nScore: Win: ${score.wins} Losses: ${score.losses}`);
      } else {
        score.losses++
        console.log(`Your guess: ${guess}, You lose. \nScore: Win: ${score.wins} Losses: ${score.losses}`)
      }

      localStorage.setItem('score', JSON.stringify(score));
    }
