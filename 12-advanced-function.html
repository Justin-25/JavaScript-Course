  <title>Advance Function</title>
</head>
<body>
  <button onclick="" class="js-button">Click</button>
  <script>


    /*

    // FUNCTION SYNTAX
    // ADVANTAGES:
    // EASIER TO READ
    // HOISTING

    greeting(); // HOISTING - WE CAN CALL THIS FUNCTION BEFORE WE CREATE IT IN THE CODE. HOISTING DOESN'T WORK WHEN WE CREATE OUR FUNCTION AND SAVE IT IN A VARIABLE
    
    function greeting() {
      console.log('Hello');
    };

    // THIS IS KNOWN AS 'CALLING THE FUNCTION'
    greeting(); // THIS LINE OF CODE WELL RUN THE CODE INSIDE THE FUNCTION AND DISPLAY IT.

    // FUNCTIONS ARE VALUES
    // TYPE OF VALUES
    // numbers, string, booleans
    const num = 2;

    // FUNCTIONS ARE ALSO VALUES
    // - WE CAN SAVE A FUNCTION INSIDE A VARIABLE
    // const function1 = function greeting() {
    //   console.log('Hello2');
    // };

    // ANONYMOUS FUNCTION
    // FUNCTION WITHOUT A NAME
    const function1 = function () {
      console.log('Hello2');
    };
    console.log(function1); // THIS WILL SHOW US THAT THE VARIABLE FUNCTION1 ACTUALLY CONTAINS THE FUNCTION INSIDE VARIABLE
    console.log(typeof function1);
    function1(); // THIS WILL RUN THE CODE INSIDE OF FUNCTION

    // WHAT ELSE CAN WE DO WITH A VALUE?
    // - SAVE A VALUE IN AN OBJECT
    const object1 = {
      num: 2,
      // THIS IS CALLED METHOD
      // - WHEN WE HAVE A FUNCTION SAVED INSIDE AN OBJECT
      fun: function () {
        console.log('Hello3');
      }
    }

    object1.fun(); // SINCE THIS VALUE IS A FUNCTION WE CAN CALL IT USING '()', THIS WILL RUN THE CODE INSIDE THE FUNCTION AND DISPLAY 'HELLO3'.

    // WHAT ELSE CAN WE DO WITH A VALUE?
    // - PASS A VALUE INTO A FUNCTION
    function display(param) {
      console.log(param);
    };

    // THIS IS KNOWN A VALUE PASSING INTO A FUNCTION
    display(2); // THIS WILL TAKE THE VALUE 2, SAVE IT INSIDE PARAM AND THEN WE CAN USE IT JUST LIKE A VARIABLE.

    // WE CAN ALSO PASS A FUNCTION INTO A FUNCTION
    // PASSING A FUNCTION INTO ANOTHER FUNCTION
    function run(param) {
      // SINCE PARAM CONTAINS A FUNCTION WE CAN ACTUALLY JUST CALL IT USING ROUND BRACKETS.
      param(); // WE CAN USE 'param' JUST LIKE A VARIABLE, THIS CODE WILL RUN THE FUNCTION THAT WE CREATED DOWN HERE AND DISPLAY 'Hello4'.
    };

    // THIS WILL TAKE THIS FUNCTION AND SAVE IT INSIDE 'param' 
    // THE FUNCTION THAT WE'RE PASSING IN IS CALLED A 'CALLBACK FUNCTION or CALLBACK'
    run(function () {
      console.log('Hello4');
    })

    // setTimeout()
    // - allows us to run a function in the future
    // setTimeout() - takes two parameter inside these brackets
    // 1. A FUNCTION WE WANT TO RUN IN THE FUTURE\
    // 2. HOW LONG TO WAIT BEFORE RUNNING THIS FUNCTION
      // - (a number in milliseconds) 1000 milliseconds = 1 second
    // ADVANTAGE OF BEING ASYNCHRONOUS
    // - IT DOESN'T BLOCK OUR CODE FOR 3 SECONDS
    setTimeout(function () {
      console.log('timeout');
    }, 3000); // IS A BUILT-IN FUNCTION, SO WE CAN TYPE BRACKETS TO CALL THIS FUNCTION

    // ASYNCHRONOUS CODE
    // COMPUTER WON'T WAIT FOR A LINE TO FINISH BEFORE GOING TO THE NEXT LINE
    console.log('next line');

    // SYNCHRONOUS CODE
    // COMPUTER WILL WAIT FOR ONE LINE TO FINISH BEFORE GOING TO THE NEXT LINE
    setTimeout(function () {
      console.log('timeout');
      console.log('timeout2');
    }, 3000); // IS A BUILT-IN FUNCTION, SO WE CAN TYPE BRACKETS TO CALL THIS FUNCTION

    // setInterval();
    // - returns a number
    // - we can use it to stop the interval
    // A FUNCTION WE WANT TO RUN IN THE FUTURE
    // A NUMBER IN MILLISECONDS
    // IT WILL KEEP RUNNING THE FUNCTION EVERY 3 SECONDS
    setInterval(function () {
      console.log('interval');
    }, 3000); // IS A BUILT-IN FUNCTION, SO WE CAN TYPE BRACKETS TO CALL THIS FUNCTION

    console.log('next line 2'); // it will set up the interval and then immediateley go to the next line and display next line 2

    // ANOTHER WAY TO LOOP THROUGH AN ARRAY
    // .forEach() - is the preferred way to loop through an array
    // SO WHAT forEach() DOES IS THAT IT LOOPS THROUGH AN THE ARRAY AND FOR EACH OF THESE VALUES IT WILL SAVE THE VALUE IN THE PARAMETER AND RUN THE FUNCTION.
    // second parameter is the 'index' or the position of the value in the array.
    [
      'make dinner', // it'll take the first value save it in this parameter and run the function, first value will be zero.
      'wash dishes', // then it will take the second value save it in this parameter and run the function, second value will be one.
      'watch youtube'// then it will take the third value save it in this parameter and run the function, third value will be two.
    ].forEach(function (value, index) {
      // IF VALUE IS 'WASH DISHES', WERE GOING TO SKIP IT
      if (value === 'wash dishes') {
        // Does the same thing as continue in a for loop.
        return; // this return statement will end this function early and it will go on to the next function
      }
      // PASSING A FUNCTION INTO ANOTHER FUNCTION
      console.log(index);
      console.log(value);
    }); // THIS IS THE 'forEach()' METHOD IT ALLOWS US TO LOOP THROUGH THIS ARRAY.

    // IF WE NEED TO USE 'break;'
    // THEN IT'S BETTER TO USE A REGULAR FOR LOOP.


    // A shorter way to write functions
    // ARROW FUNCTIONS

    // Regular Function
    const regularFunction = function (param, param2) {
      console.log('Hello Regular');

      return 5;
    };

    regularFunction();

    // Arrow Function - mostly works the same as a regular function
    const arrowFunction = (param, param2) => {
      console.log('Hello');

      return 5;
    };

    arrowFunction();
    

    // Differences
    // Arrow functions have shortcuts

    const oneParam = param => {
      console.log(param + 1);
    }

    oneParam(2);

    // One line arrow function
    const oneLine = () => 2 + 3;
    console.log(oneLine());


    // Practice using arrow Functions
    // So when were passing a function into another function like foreach, It's recommended to use Arrow Functions, because it makes our code easier to read
    [
      'make dinner',
      'wash dishes',
      'watch youtube'
    ].forEach((value, index) => {
      if (value === 'wash dishes') {
        return;
      }
      console.log(index);
      console.log(value);
    });


    // Even though we could create an arrow function version of this (autoPLay()), I actually prefer the regular function Syntax here for 2 reason.
    // 1. Easier to Read
    // 2. Enables Hoisting - which means we call the function before we create it, and we don't have to worry which order we write the code
    // const autoPLay = () => {

    // Get a Variable Out of a File
    // 1. Add type="module" attribute
    // Export
    // Import
    // }
    function autoPLay() {
      if (!isAutoPlaying) {
        intervalId = setInterval( () => {
          const playerPick = pickMove();
          playerMove(playerPick);
        }, 1000);

        isAutoPlaying = true;
      } else {
        clearInterval(intervalId);
        isAutoPlaying = false;
      }
    }

    // Passing a function into another function
    function removeTodoList() {
      let todoListHtml = '';

      todos.forEach((valueObject, index) => {
        const {
          name,
          dueDate // Shorthand Property
        } = valueObject;
        const generateHtml = `
          <div class="todoList">${name}</div>
          <div class="todoList">${dueDate}</div>
          <button class="delete" onclick="
            todos.splice(${index}, 1);
            removeTodoList();
            ">Delete</button>  
          `; // Generating the HTML
        todoListHtml += generateHtml;
      })

      console.log(todoListHtml);
      document.querySelector('.js-result-todoList').innerHTML = todoListHtml;

      localStorage.setItem('todos', JSON.stringify(todos));
    }

    // We could use Arrow functions which is inside an object
    const object2 = {
      method: () => {
        // so even though we could save an arrow function inside an object, Objects already have shortcut for functions
      },
      method() {
        // This syntax is Shorthand Method
        // When saving a function in an object it's actually recommended to use this syntax instead
      }
    }

  // .addEventListener()
  // - let us run some code when we interact with the element
  // - has two parameters
  // 1. event 'click' or what type of interaction we want to listen for.
  // 2. A function we want to run -  when we click this 'click' element
  // 'click' - the way to find these event names is to look at this attribute the word after 'on' 'onclick' is the event

  // Passing a function into another function
  // => use arrow function

  // .addEventListener() has some advantages over using an attribute
  // 1. Multiple event listeners for an event
  // 2. We can remove an event listener using a method called '.removeEventListener()'
  // .removeEventListener() - also has two parameter
  // 1. event  
  // 2. A function we want to run -  when we click this 'click' element

  // More features that use functions as values
  // 2 more array methods
  // .filter() and .map()

  // .filter()
  // 1. Create a new array []
  // 2. return true,
  // => put value in array 
  // 3, return false
  // => not put value in array
  // [1, -3, 5] => [1, 5]
  // Negative numbers removed
  // filter works the same way as for each, the only difference is that this time this inner function will return a value so we'll type a return
  console.log([
    1,
    -3,
    5
  ].filter((value, index) => {
    /*
    if(value >= 0) {
      return true;
    } else {
      return false;
    }
    */

    return value >= 0; // this will return true if it's >= 0 and it will return false otherwise, This line does the same thing on the upper code. 
  }));

  // .map()
  // 1. Create a new array []
  // Whatever we return
  // => added to new array
  // .map() = transform an array into another array
  // [1, 1, 3] => [2, 2, 6]
  // we want to copy of this array with each number doubled.

  console.log([
    1,
    1,
    3
  ].map((value, index) => {
    return value * 2;
  }));

  // Shortcuts of arrow functions
  console.log([
    1,
    1,
    3
  ].map( value => value * 2));

  // Feature of fucntions called a Closure
  // Closure
  // - if a function has access to a value
  // - it will always have access to that value
  // - the value gets packaged together (enclosed) with the function
