<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objects</title>
</head>
<body>
  <h2>Rock✊ Paper🤚 Scissors✌️.</h2>
  <button onclick="playGame('rock')">
    Rock
  </button>
  
  <button onclick="playGame('paper')">
    Paper
  </button>
  
  <button onclick="playGame('scissor');">
    Scissors
  </button>

  <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.tie = 0;
      localStorage.removeItem('score');
  ">
    Reset
  </button>
  <script>

    // Object References 
    const object1 = {
      rating: 0,
      subs: 0,
      count: 0,
    }

    //Copy References
    const object2 = object1;

    // Can change inside object references
    object1.rating = 12;
    console.log(object1);

    // We can't Compare objects directly - references(object3) - 
    const object3 = {
      rating: 12 /*Inside of objects is Values */
    }
    console.log(object3 === object1);

    const object4 = {
      message: 'Good Morning!'
    }

    // Normal way to get the message property out of the object
    // const message = object4.message;

    // Distructuring shortcut - easier way to take properties out of an object.
    const {message} = object4;
    console.log(message);

    // Shorthand Property
    const object5 = {
      // message: message /* It takes what inside the message variable in object4 and substitute it into this code*/
      message, /* Shorthand Property */
      // method: function func1() {
      //   console.log('method');
      // }, /*Normal way of creating a function inside Object*/
      method() {
        console.log('method');
      } /*Shorthand Method*/
    };
    console.log(object5);
    object5.method();


    // Null vs undentified.
    // Null 
    // function func(parameter = 'default') {
    //   console.log(parameter);
    // }

    // func(null);


    // // Global variable
    // let results = '';

    // Object
    // const score = {
    //   // Property
    //   wins: 0,
    //   losses: 0,
    //   tie: 0
    // };

    // JSON object convert to JS object
    let score = JSON.parse(localStorage.getItem('score'));

    if (score === null) {
      score = {
        wins: 0,
        losses: 0,
        tie: 0
      };
    }

    // Player Move
      function playGame(playerMove) {
        const computerMove = pickMove();
        let results = '';

        if (playerMove === 'scissor') {

          if (computerMove === 'rock') {
            results = 'You lose';
          } else if (computerMove === 'paper') {
            results = 'You win';
          } else if (computerMove === 'scissor') {
            results = 'Tie';
          };

        } else if (playerMove === 'paper') {

          if (computerMove === 'rock') {
            results = 'You win';
          } else if (computerMove === 'paper') {
            results = 'Tie';
          } else if (computerMove === 'scissor') {
            results = 'You lose';
          };

        } else if (playerMove === 'rock') {

            if (computerMove === 'rock') {
              results = 'Tie';
            } else if (computerMove === 'paper') {
              results = 'You lose';
            } else if (computerMove === 'scissor') {
              results = 'You win';
            };
        }

        if(results === 'You win') {
          score.wins++;
        } else if (results === 'You lose') {
          score.losses++;
        } else if (results === 'Tie') {
          score.tie++
        }

        // if(playerMove === 'reset') {
        //   score.wins = 0;
        //   score.losses = 0;
        //   score.tie = 0;
        //   return;
        // }

        // JS object convert to JSON object
        localStorage.setItem('score', JSON.stringify(score));
        alert(`You pick ${playerMove}. Computer pick ${computerMove}. Result: ${results}. \nWins: ${score.wins}, Losses: ${score.losses}, Tie: ${score.tie}.`);
      }

    // Computer will pick a random.
      function pickMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1 ) {
          computerMove = 'scissor';
        };

        return computerMove;
      }

      function resetButton(reset) {
        score.wins = 0;
        score.losses = 0;
        score.tie = 0;
      }
  </script>
</body>
</html>
