<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM rock paper scissor projects</title>
</head>
<body>
  <p>Rock. Paper. Scissor</p>
  <button onclick="playerMove('rock')">Rock</button>
  <button onclick="playerMove('paper')">Paper</button>
  <button onclick="playerMove('scissor')">Scissor</button>
  <p class="js-result"></p>
  <p class="js-pick"></p>
  <p class="js-score"></p>
  <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.tie = 0;
      localStorage.removeItem('score');
      updateScore();
  ">Reset Score</button>
  <script>

    // Convert JSON object into JS object
    let score = JSON.parse(localStorage.getItem('score'));

    // Object score
    if (score === null) {
      score = {
        wins: 0,
        losses: 0,
        tie: 0
      }
    }

    // PLayer move
    function playerMove(move) {
      const computerMove = pickMove();
      let result = ''

      if (move === 'rock') {
        if (computerMove === 'rock') {
          result = 'Tie.';
        } else if (computerMove === 'paper') {
          result = 'You lose.';
        } else if (computerMove === 'scissor') {
          result = 'You win.';
        }
      } else if (move === 'paper') {
        if (computerMove === 'rock') {
          result = 'You win.';
        } else if (computerMove === 'paper') {
          result = 'Tie.';
        } else if (computerMove === 'scissor') {
          result = 'You lose.';
        }
      } else if (move === 'scissor') {
        if (computerMove === 'rock') {
          result = 'You lose.';
        } else if (computerMove === 'paper') {
          result = 'You win.';
        } else if (computerMove === 'scissor') {
          result = 'Tie.';
        }
      }

      if (result === 'You win.') {
        score.wins++;
      } else if (result === 'You lose.') {
        score.losses++;
      } else if (result === 'Tie.') {
        score.tie++
      }

      updateScore();

      localStorage.setItem('score', JSON.stringify(score));
      document.querySelector('.js-result').innerHTML = `Result: ${result}`;
      document.querySelector('.js-pick').innerHTML = `You: ${move} - ${computerMove} :Computer`
    }

    function updateScore() {
      document.querySelector('.js-score').innerHTML = `Score: Wins: ${score.wins}, Losses: ${score.losses}, Tie: ${score.tie}.`;
    }

    // Computer will pick a random
    function pickMove() {
      const randomNumber = Math.random();
      let computerMove = ''

      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerMove = 'rock';
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = 'paper';
      } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
        computerMove = 'scissor';
      }

      return computerMove;
    }
  </script>
</body>
</html>
